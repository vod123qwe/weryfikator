name: Aktualizacja newsow

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zaleznosci
        run: pip install feedparser requests

      - name: Uruchom agregacje
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_and_generate.py

      - name: Commituj articles.json
        run: |
          git config user.name "Weryfikator Bot"
          git config user.email "bot@weryfikator.pl"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "Aktualizacja $(date +'%Y-%m-%d %H:%M UTC')"
          git push
